<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATÁLAGO</title>
    <link rel="stylesheet" href="../css/catal.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
</head>
<body>

    <header>
        <h1>☕ Café X</h1>
        <p>Nosso catálogo</p>
    </header>

    <section class="catalogo">

        <div class="produto">
            <img src="../Imgs/menu-2.png" alt="Café Expresso">
            <h2>Expresso</h2>
            <p>Café forte e encorpado pra te energia.</p>
           <div class="price">R$ 5,90<span>R$ 8,00</span></div>
        </div>

        <div class="produto">
            <img src="../Imgs/menu-3.png" alt="Cappuccino">
            <h2>Cappuccino</h2>
            <p>Com leite vaporizado e espuma.</p>
           <div class="price">R$ 11,90<span>R$ 15,00</span></div>
        </div>

        <div class="produto">
            <img src="../Imgs/menu-4.png" alt="Croissant">
            <h2>Latte</h2>
            <p>Com bastante cafe e espuma.</p>
           <div class="price">R$ 12,90<span>R$ 16,00</span></div>
        </div>

        <div class="produto">
            <img src="../Imgs/menu-5.png" alt="Bolo de Chocolate">
            <h2>Mocha</h2>
            <p>Com muito amor e cobertura cremosa.</p>
            <div class="price">R$ 13,90<span>R$ 18,00</span></div>
        </div>

    </section>

</body>
</html>

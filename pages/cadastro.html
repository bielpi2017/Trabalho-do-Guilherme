<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO</title>
    <link rel="stylesheet" href="../Css/cad.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
</head>
<body>
    <div class="container">
        <div class="form-img">
            <img src="../imgs/2148209262.jpg">
        </div>
        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="title">
                        <h1>Cadastre-se</h1>
                    </div>
                    <div class="login-button">
                        <button><a href="#">Entrar</a></button>
                    </div>
                </div>

                <div class="inpunt-group">
                    <div class="input-box">
                        <label for="firstname">Primeiro nome:</label>
                        <input id="firstname" type="text" name="firstname"  placeholder="Digite seu primeiro nome"  required>   
                    </div>

                    <div class="input-box">
                        <label for="lastname">Sobrenome:</label>
                        <input id="lastname" type="text" name="lastname" placeholder="Digite seu sobrenome" required>
                    </div>

                    <div class="input-box">
                        <label for="email">Email:</label>
                        <input id="email" type="email" name="email" placeholder="Digite seu email"  required>
                    </div>

                    <div class="input-box">
                        <label for="number">Número:</label>
                        <input id="number" type="tel" name="number" placeholder="(xx) xxxxx-xxxx"  required>
                    </div>

                    <div class="input-box">
                        <label for="password">Senha:</label>
                        <input id="password" type="password" name="password" placeholder="Digite sua senha" required>
                    </div>

                    <div class="input-box">
                        <label for="confirmpassword">Confirme Sua Senha:</label>
                        <input id="confirmpassword" type="password" name="confirmpassword"      placeholder="Digite sua senha" required>
                            
                    </div>
                </div>

                <div class="gender-inputs">
                    <div class="gender-title">
                        <h6>Gênero:</h6>
                    </div>

                    <div class="gender-group">
                        <div class="gender-input">
                            <input type="radio" id="famale" name="gander">
                            <label for="famale">Feminino</label>
                        </div>

                        <div class="gender-input">
                            <input type="radio" id="male" name="gander">
                            <label for="male">Masculino</label>
                        </div>

                        <div class="gender-input">
                            <input type="radio" id="other" name="gander">
                            <label for="other">Outro</label>
                        </div>
                        <div class="gender-input">
                            <input type="radio" id="none" name="gander">
                            <label for="none">Prefiro não informar</label>
                        </div>

                    </div>
                </div>
        <div class="continue-button">
            <button><a href="../index.html">Continuar</a></button>
        </div>
        </form>
    </div>
    </div>
</body>

</html>
